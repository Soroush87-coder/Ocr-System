<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Look Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Vazirmatn:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b1830;
  --muted:#6b7280;
  --bg:#efedfb;
  --surface:#ffffff;
  --line:#e7e8f1;
  --field:#f7f7fc;
  --indigo:#4f46e5;
  --indigo-deep:#4338ca;
  --indigo-soft:#eeedfd;
  --danger:#c0392b;
  --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Vazirmatn', system-ui, sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100dvh;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
.page{max-width:1060px;margin:0 auto;padding:26px 18px 48px}

/* shell: white rounded card with two panels */
.shell{
  background:var(--surface);
  border-radius:30px;
  padding:16px;
  display:grid;
  grid-template-columns:0.82fr 1fr;
  gap:16px;
  direction:ltr;
  box-shadow:0 32px 70px -28px rgba(58,46,140,.40), 0 4px 14px rgba(58,46,140,.06);
}

/* ---- left gradient hero ---- */
.hero{
  position:sticky;top:26px;align-self:start;
  min-height:560px;
  border-radius:20px;
  padding:26px;
  color:#fff;
  display:flex;flex-direction:column;justify-content:space-between;
  overflow:hidden;
  background:
    radial-gradient(120% 110% at 12% 16%, #66d0ff 0%, rgba(102,208,255,0) 42%),
    radial-gradient(120% 120% at 34% 52%, #2a1f8c 0%, rgba(42,31,140,0) 56%),
    linear-gradient(140deg, #5b8def 0%, #4f46e5 42%, #8b7bf0 78%, #c8c2f6 100%);
}
.ast{width:1em;height:1em;display:block}
.hero .mark{color:#fff;font-size:30px;opacity:.96}
.hero-text{direction:rtl;text-align:right}
.hero h2{margin:0 0 10px;font-size:25px;line-height:1.5;font-weight:800;letter-spacing:-.2px}
.hero .hero-note{margin:0 0 16px;font-size:13px;font-weight:500;opacity:.85}
.hero .privacy{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.16);backdrop-filter:blur(4px);
  font-size:12px;font-weight:500;padding:7px 12px;border-radius:999px;
}

/* ---- right working panel ---- */
.work{direction:rtl;padding:14px 14px 6px;min-width:0}
.brand{display:flex;align-items:flex-start;gap:12px;margin-bottom:22px}
.brand .mark{color:var(--indigo);font-size:24px;margin-top:4px}
.brand h1{margin:0;font-family:'Inter',sans-serif;font-weight:800;font-size:27px;letter-spacing:-.5px;color:var(--ink)}
.brand .tagline{margin:3px 0 0;font-size:14.5px;color:var(--muted)}

/* drop zone */
.drop{
  position:relative;display:block;
  background:var(--field);
  border:1.5px dashed #c9c8e8;
  border-radius:16px;
  padding:34px 22px;
  text-align:center;cursor:pointer;
  transition:border-color .15s ease, background .15s ease;
}
.drop:hover{border-color:var(--indigo);background:var(--indigo-soft)}
.drop.drag{border-color:var(--indigo);background:var(--indigo-soft)}
.drop .ic{font-size:32px;line-height:1;color:var(--indigo)}
.drop .big{font-weight:700;margin:12px 0 4px;font-size:17px;color:var(--ink)}
.drop .small{color:var(--muted);font-size:14px}
.drop input{display:none}
.formats{margin-top:14px;font-size:12px}
.formats span{display:inline-block;background:#fff;border:1px solid var(--line);
  color:var(--muted);border-radius:6px;padding:2px 8px;margin:2px;font-family:var(--mono);font-size:11px}

.engine{margin:14px 2px 0;font-size:12px;color:var(--muted);min-height:18px}

/* result card */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:16px;
  margin-top:18px;
  overflow:hidden;
}
.card-head{
  display:flex;align-items:center;gap:12px;
  padding:13px 15px;border-bottom:1px solid var(--line);
}
.card-head .fname{font-weight:700;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.badge{
  flex:none;font-size:11px;font-weight:700;letter-spacing:.2px;
  padding:4px 10px;border-radius:999px;
  color:var(--indigo-deep);background:var(--indigo-soft);border:1px solid #d9d6f7;
}
.badge.unknown{color:var(--muted);background:#f3f4f8;border-color:var(--line)}

/* preview + scan */
.preview-zone{position:relative;background:#eef0f8;max-height:340px;overflow:hidden;display:grid;place-items:center}
.preview-zone img,.preview-zone canvas{max-width:100%;max-height:340px;display:block}
.scanline{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--indigo),transparent);
  box-shadow:0 0 18px 3px rgba(79,70,229,.55);
  animation:scan 1.6s ease-in-out infinite;
}
@keyframes scan{0%{top:4%}50%{top:96%}100%{top:4%}}
.proc{padding:18px 16px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
.bar{flex:1;height:6px;background:#edecf6;border-radius:999px;overflow:hidden}
.bar > i{display:block;height:100%;width:0;background:var(--indigo);border-radius:999px;transition:width .2s ease}

/* fields table */
.fields{padding:10px 18px 8px}
.row{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #f1f1f7;line-height:1.75}
.row:last-child{border-bottom:0}
.row .k{flex:none;width:150px;color:var(--muted);font-size:14px;font-weight:500}
.row .v{flex:1;font-family:var(--mono);font-size:15px;font-weight:500;color:var(--ink);word-break:break-word;line-height:1.7}
.row .v[dir="ltr"]{text-align:left}
.row.miss .v{color:var(--danger);font-style:italic;font-family:'Vazirmatn',sans-serif}
.no-mrz{padding:14px 16px;color:var(--muted);font-size:13px}

/* MRZ + raw blocks */
.block{padding:14px 16px;border-top:1px solid var(--line)}
.block h4{margin:0 0 8px;font-size:12px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:6px}
.mrz{
  font-family:var(--mono);font-size:13px;letter-spacing:1px;line-height:1.9;
  background:var(--indigo-soft);color:var(--indigo-deep);border-radius:10px;padding:14px 16px;
  white-space:pre;overflow-x:auto;direction:ltr;text-align:left;
}
details.raw summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--muted);list-style:none}
details.raw summary::-webkit-details-marker{display:none}
details.raw summary::before{content:'▸ ';color:var(--indigo)}
details.raw[open] summary::before{content:'▾ '}
textarea.rawtext{
  width:100%;margin-top:10px;min-height:150px;resize:vertical;
  font-family:var(--mono);font-size:12.5px;line-height:1.6;
  background:var(--field);border:1px solid var(--line);border-radius:10px;padding:12px;
  direction:ltr;text-align:left;color:var(--ink);
}

/* actions */
.actions{display:flex;flex-wrap:wrap;gap:10px;padding:14px 16px;border-top:1px solid var(--line)}
button.btn{
  font-family:inherit;font-weight:700;font-size:14.5px;cursor:pointer;
  border-radius:11px;padding:11px 18px;border:1px solid var(--line);
  background:#fff;color:var(--ink);transition:transform .05s ease, background .15s ease, border-color .15s ease;
}
button.btn:hover{border-color:#c9c8e8}
button.btn:active{transform:translateY(1px)}
button.btn.primary{background:var(--indigo);color:#fff;border-color:var(--indigo)}
button.btn.primary:hover{background:var(--indigo-deep);border-color:var(--indigo-deep)}
button.btn:disabled{opacity:.5;cursor:default}

.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:500;
  opacity:0;pointer-events:none;transition:.25s ease;z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.foot{text-align:center;color:#9a98b5;font-size:12px;margin-top:22px}

@media (max-width:760px){
  .shell{grid-template-columns:1fr;border-radius:24px}
  .hero{position:static;min-height:0;padding:22px}
  .hero h2{font-size:21px}
  .hero .mark{margin-bottom:26px}
}
@media (max-width:520px){
  .row{flex-direction:column;gap:2px}
  .row .k{width:auto}
  .actions button.btn{flex:1}
}
@media (prefers-reduced-motion:reduce){
  .scanline{animation:none;top:50%}
}
</style>
</head>
<body>
<div class="page">
  <main class="shell">

    <!-- left gradient hero -->
    <aside class="hero">
      <div class="mark">
        <svg class="ast" viewBox="0 0 24 24" fill="none"><path d="M12 2.5v19M2.5 12h19M5.2 5.2l13.6 13.6M18.8 5.2L5.2 18.8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/></svg>
      </div>
      <div class="hero-text">
        <h2>به‌سادگی اطلاعاتی که می‌خوای رو استخراج کن</h2>
        <p class="hero-note">پنل اختصاصی Travel Market</p>
        <span class="privacy">🔒 همه‌چیز داخل مرورگر شما پردازش می‌شود</span>
      </div>
    </aside>

    <!-- right working panel -->
    <section class="work">
      <div class="brand">
        <span class="mark">
          <svg class="ast" viewBox="0 0 24 24" fill="none"><path d="M12 2.5v19M2.5 12h19M5.2 5.2l13.6 13.6M18.8 5.2L5.2 18.8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/></svg>
        </span>
        <div>
          <h1>Look Studio</h1>
          <p class="tagline">سند را آپلود کنید تا اطلاعاتش استخراج شود</p>
        </div>
      </div>

      <label class="drop" id="drop">
        <input type="file" id="file" accept="image/*,.heic,.heif,.pdf,application/pdf" multiple>
        <div class="ic">⬆</div>
        <div class="big">عکس یا PDF را اینجا رها کنید</div>
        <div class="small">یا برای انتخاب فایل کلیک کنید — می‌توانید چند فایل را با هم اضافه کنید</div>
        <div class="formats">
          <span>JPG</span><span>PNG</span><span>PDF</span><span>HEIC</span><span>WEBP</span>
        </div>
      </label>
      <div class="engine" id="engine"></div>

      <div id="results"></div>
    </section>

  </main>
  <p class="foot">Tesseract OCR + تشخیص MRZ — Look Studio</p>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script>
"use strict";
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

const $ = s => document.querySelector(s);
const dropEl = $('#drop');
const fileEl = $('#file');
const resultsEl = $('#results');
const engineEl = $('#engine');
const toastEl = $('#toast');

let worker = null;            // reused Tesseract worker
let queue = Promise.resolve(); // process files one at a time

/* ---------- helpers ---------- */
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>toastEl.classList.remove('show'), 1900);
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}

async function getWorker(){
  if (worker) return worker;
  engineEl.textContent = 'در حال بارگذاری موتور OCR (بار اول کمی طول می‌کشد)…';
  worker = await Tesseract.createWorker('eng', 1, {
    logger: m => {
      if (m.status === 'recognizing text' && currentBar){
        currentBar.style.width = Math.round(m.progress*100) + '%';
      }
    }
  });
  engineEl.textContent = '';
  return worker;
}
let currentBar = null;

/* draw an image source onto a canvas, lightly cleaned up for OCR */
function prepCanvas(source, w, h){
  const MAX = 3200;
  let scale = 1;
  if (Math.max(w,h) > MAX) scale = MAX / Math.max(w,h);
  const cw = Math.round(w*scale), ch = Math.round(h*scale);
  const c = document.createElement('canvas');
  c.width = cw; c.height = ch;
  const ctx = c.getContext('2d');
  ctx.drawImage(source, 0, 0, cw, ch);
  // grayscale + mild contrast — helps OCR on phone photos
  try{
    const img = ctx.getImageData(0,0,cw,ch);
    const d = img.data, k = 1.25, m = 128*(1-k);
    for (let i=0;i<d.length;i+=4){
      let g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
      g = g*k + m;
      g = g<0?0:g>255?255:g;
      d[i]=d[i+1]=d[i+2]=g;
    }
    ctx.putImageData(img,0,0);
  }catch(e){/* tainted canvas etc. — keep original */}
  return c;
}

function cloneCanvas(source){
  const c = document.createElement('canvas');
  c.width = source.width; c.height = source.height;
  c.getContext('2d').drawImage(source, 0, 0);
  return c;
}

function cropCanvas(source, x, y, w, h, scale=1){
  const sx = Math.max(0, Math.round(source.width*x));
  const sy = Math.max(0, Math.round(source.height*y));
  const sw = Math.min(source.width-sx, Math.round(source.width*w));
  const sh = Math.min(source.height-sy, Math.round(source.height*h));
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.round(sw*scale));
  c.height = Math.max(1, Math.round(sh*scale));
  c.getContext('2d').drawImage(source, sx, sy, sw, sh, 0, 0, c.width, c.height);
  return c;
}

function thresholdCanvas(source){
  const c = cloneCanvas(source);
  const ctx = c.getContext('2d');
  try{
    const img = ctx.getImageData(0,0,c.width,c.height);
    const d = img.data;
    for (let i=0;i<d.length;i+=4){
      const g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
      const v = g > 150 ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=v;
    }
    ctx.putImageData(img,0,0);
  }catch(e){}
  return c;
}

async function fileToImageBlob(file){
  const isHeic = /heic|heif/i.test(file.type) || /\.(heic|heif)$/i.test(file.name);
  if (isHeic){
    if (!window.heic2any) throw new Error('تبدیل‌گر HEIC بارگذاری نشد — اینترنت را بررسی کنید');
    const out = await heic2any({ blob:file, toType:'image/jpeg', quality:0.92 });
    return Array.isArray(out) ? out[0] : out;
  }
  return file;
}

async function loadImageFile(file){
  const blob = await fileToImageBlob(file);
  // robust path: createImageBitmap handles EXIF orientation (iPhone photos)
  if (window.createImageBitmap){
    try{
      let bmp;
      try { bmp = await createImageBitmap(blob, {imageOrientation:'from-image'}); }
      catch(_) { bmp = await createImageBitmap(blob); }
      const c = prepCanvas(bmp, bmp.width, bmp.height);
      if (bmp.close) bmp.close();
      return c;
    }catch(e){ /* fall back to Image() below */ }
  }
  return await new Promise((resolve,reject)=>{
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = ()=>{ URL.revokeObjectURL(url); resolve(prepCanvas(img, img.naturalWidth, img.naturalHeight)); };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('این فرمت عکس قابل خواندن نبود — لطفاً JPG یا PNG امتحان کنید')); };
    img.src = url;
  });
}

async function loadPdfFile(file){
  if (!window.pdfjsLib) throw new Error('کتابخانه PDF بارگذاری نشد');
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  const canvases = [];
  const textChunks = [];
  const pages = Math.min(pdf.numPages, 5); // cap to keep it fast
  for (let i=1;i<=pages;i++){
    const page = await pdf.getPage(i);
    try{
      const tc = await page.getTextContent();
      const pageText = tc.items.map(item => item.str || '').join('\n').trim();
      if (pageText) textChunks.push(pageText);
    }catch(e){}
    const vp = page.getViewport({scale:2.0});
    const c = document.createElement('canvas');
    c.width = vp.width; c.height = vp.height;
    await page.render({canvasContext:c.getContext('2d'), viewport:vp}).promise;
    canvases.push(prepCanvas(c, c.width, c.height));
  }
  canvases.pdfText = textChunks.join('\n');
  return canvases;
}

/* ---------- MRZ parsing ---------- */
function cleanMrzLine(line){
  return line.toUpperCase().replace(/\s+/g,'').replace(/[«»|]/g,'<').replace(/[^A-Z0-9<]/g,'');
}
// turn raw OCR text into candidate MRZ lines
function findMrz(text){
  const baseLines = text.split(/\r?\n/).map(cleanMrzLine).filter(Boolean);
  const lines = [];
  for (const line of baseLines){
    lines.push(line);
    const nameStart = line.search(/(?:P<[A-Z]{3}|PN[A-Z]{3})[A-Z<]{3,}/);
    if (nameStart > 0) lines.push(line.slice(nameStart));
    const dataStart = line.search(/[A-Z0-9<]{8,10}[0-9OISBZ][A-Z]{3}[0-9OISBZ]{6}/);
    if (dataStart > 0) lines.push(line.slice(dataStart));
  }
  // a line looks like MRZ if it's pure MRZ charset and is mostly digits or has fillers
  const mrzish = lines.filter(l=>{
    if(!/^[A-Z0-9<]+$/.test(l)) return false;
    const len=l.length;
    const inWin = (len>=30&&len<=60) || (len>=24&&len<=34);
    const digits=(l.match(/\d/g)||[]).length;
    return inWin && (l.includes('<') || digits>=5);
  });

  const l44 = mrzish.filter(l=>l.length>=30&&l.length<=60);
  const l30 = mrzish.filter(l=>l.length>=24&&l.length<=34);

  // --- TD3 (passport / visa): 2 lines of 44 ---
  if (l44.length>=2){
    let best = null;
    for (const a of l44){
      for (const b of l44){
        if (a === b) continue;
        const nameScore = isLikelyTD3NameLine(a) ? 5 : (/^[PV]/.test(a) && a.includes('<<') ? 3 : 0);
        const line2Score = scoreTD3Line2(b);
        const score = nameScore + line2Score;
        if (!best || score > best.score) best = {line1:a, line2:b, score, line2Score};
      }
    }
    if (best && best.score >= 7){
      return {type:'TD3', lines:[norm(best.line1,44), norm(best.line2,44)], valid: best.line2Score >= 10};
    }
  }

  // --- TD1 (ID card / Emirates ID): 3 lines of 30 ---
  if (l30.length>=2){
    // line 2 carries DOB(6)+check+sex(M/F/<)
    let line2 = l30.find(l=>/^\d{6}.[MF<]/.test(l));
    // line 1 starts with doc type + issuing country (often contains ARE)
    let line1 = l30.find(l=>l!==line2 && (/ARE|^[IAC]/.test(l)) && /\d{4}/.test(l));
    // line 3 is the name line (LETTERS with << separators)
    let line3 = l30.find(l=>l!==line1 && l!==line2 && /[A-Z]{2,}<</.test(l));
    if (!line1) line1 = l30.find(l=>l!==line2);
    if (line1 && line2) return {type:'TD1', lines:[norm(line1,30), norm(line2,30), norm(line3||'',30)]};
  }
  return null;
}
function norm(l,n){ l=l.slice(0,n); while(l.length<n) l+='<'; return l; }
function fixDigits(s){ return s.replace(/O/g,'0').replace(/[IL]/g,'1').replace(/S/g,'5').replace(/B/g,'8').replace(/Z/g,'2'); }
function mrzValue(ch){
  if (ch === '<') return 0;
  if (/[0-9]/.test(ch)) return ch.charCodeAt(0) - 48;
  if (/[A-Z]/.test(ch)) return ch.charCodeAt(0) - 55;
  return 0;
}
function mrzCheck(s){
  const weights = [7,3,1];
  let sum = 0;
  for (let i=0;i<s.length;i++) sum += mrzValue(s[i]) * weights[i % 3];
  return String(sum % 10);
}
function isMrzCheckOk(value, check){
  check = fixDigits(String(check || ''));
  return /^[0-9]$/.test(check) && mrzCheck(value) === check;
}
function validMrzDate(s){
  s = fixDigits(s);
  if (!/^\d{6}$/.test(s)) return false;
  const mm = +s.slice(2,4), dd = +s.slice(4,6);
  return mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31;
}
function scoreTD3Line2(line){
  line = norm(cleanMrzLine(line), 44);
  let score = 0;
  if (isMrzCheckOk(line.slice(0,9), line[9])) score += 4;
  if (validMrzDate(line.slice(13,19))) score += 2;
  if (isMrzCheckOk(line.slice(13,19), line[19])) score += 3;
  if (/[MF<]/.test(line[20])) score += 1;
  if (validMrzDate(line.slice(21,27))) score += 2;

  f.issue_date  = t.issue_date || '';
  f.issue_place = t.issue_place || '';
  f.place_of_birth = t.place_of_birth || '';
  f.occupation  = t.occupation || '';
  f.company_name = t.company_name || '';
  f.uid_number = t.uid_number || '';
  f.file_number = t.file_number || '';
  f.emirates_id = eid || cleanFieldValue(t.card_number).replace(/\s+/g,'-');
  f.document_kind = detectDocumentKind(f, mrz, raw);
  return f;
}

/* ---------- rendering ---------- */
function detectDocumentKind(fields, mrz, raw){
  if (/ویزای اقامت|RESIDENCE|ﺇﻗﺎﻣﺔ|اقامة|PROPERTY OWNER|SELF SPONSOR|U[0-9]{6,12}|[0-9]{3}\/[0-9]{4}\/[0-9]{5,10}/i.test(fields.doc_type + ' ' + raw)) return 'uae_residence';
  if (fields.emirates_id || /Emirates\s*ID|Emirates\s*Identity|Resident\s*Identity\s*Card/i.test(raw)) return 'emirates_id';
  if (mrz && mrz.type === 'TD1' && /ARE/.test(mrz.lines.join(''))) return 'emirates_id';
  if (/پاسپورت/.test(fields.doc_type) || /PASSPORT/i.test(raw)) return 'passport';
  return 'generic';
}

const FIELD_SETS = {
  passport: [
    ['name','Name'],
    ['surname','Surname'],
    ['passport_number','Passport number'],
    ['expiry','Expiry date'],
    ['issue_date','Issue date'],
    ['place_of_birth','Place of birth'],
    ['dob','Date of birth'],
  ],
  emirates_id: [
    ['emirates_id','Emirates ID'],
    ['issue_date','Issue date'],
    ['expiry','Expire date'],
    ['occupation','Occupation'],
    ['company_name','Company name'],
  ],
  uae_residence: [
    ['doc_type','Document type'],
    ['full_name','Full name'],
    ['emirates_id','Emirates ID'],
    ['uid_number','UID number'],
    ['file_number','File number'],
    ['passport_number','Passport number'],
    ['issue_date','Issue date'],
    ['expiry','Expire date'],
    ['occupation','Occupation'],
    ['company_name','Sponsor / company'],
  ],
  generic: [
    ['doc_type','نوع سند'],
    ['full_name','نام کامل'],
    ['number','شماره سند'],
    ['nationality','ملیت'],
    ['dob','تاریخ تولد'],
    ['sex','جنسیت'],
    ['expiry','تاریخ انقضا'],
    ['issue_date','تاریخ صدور'],
  ],
};

function displayFields(fields){
  const core = FIELD_SETS[fields.document_kind] || FIELD_SETS.generic;
  return {core, extra:[]};
}

function buildTextOutput(fileName, fields, mrz, raw){
  let t = `سند‌خوان — Travel Market\nفایل: ${fileName}\nزمان: ${new Date().toLocaleString('fa-IR')}\n`;
  t += `${'='.repeat(40)}\n\nاطلاعات استخراج‌شده\n${'-'.repeat(40)}\n`;
  const {core, extra} = displayFields(fields);
  core.forEach(([k,lab])=>{
    const v = fields[k];
    t += `${lab}: ${v && String(v).trim() ? v : '— یافت نشد —'}\n`;
  });
  extra.forEach(([k,lab])=>{ t += `${lab}: ${fields[k]}\n`; });
  const hasAny = core.some(([k])=>fields[k] && String(fields[k]).trim()) || extra.length>0;
  if (mrz){ t += `\nMRZ\n${'-'.repeat(40)}\n${mrz.lines.join('\n')}\n`; }
  if (!hasAny){ t += `\nمتن کامل OCR\n${'-'.repeat(40)}\n${raw}\n`; }
  return t;
}

function renderCard(card, fileName, previewCanvas, fields, mrz, raw){
  const {core, extra} = displayFields(fields);
  const hasAny = core.some(([k])=>fields[k] && String(fields[k]).trim()) || extra.length>0;
  const badge = fields.doc_type || 'نامشخص';
  const badgeClass = fields.doc_type ? '' : 'unknown';

  const rowHtml = ([k,lab])=>{
    const v = fields[k];
    const ok = v && String(v).trim();
    const ltr = ok && /^[\x00-\x7F]+$/.test(String(v));
    return `<div class="row ${ok?'':'miss'}">
      <div class="k">${lab}</div>
      <div class="v" ${ltr?'dir="ltr"':''}>${ok?esc(v):'— یافت نشد —'}</div>
    </div>`;
  };

  let rows;
  if (hasAny){
    rows = '<div class="fields">' + core.map(rowHtml).join('') + extra.map(rowHtml).join('') + '</div>';
  } else {
    rows = '<div class="no-mrz">این سند فرمت استاندارد (MRZ یا برچسب‌دار) نداشت، پس فیلد ساختاریافته‌ای استخراج نشد. متن کامل OCR در پایین در دسترس است.</div>';
  }

  const txt = buildTextOutput(fileName, fields, mrz, raw);

  card.innerHTML =
    `<div class="card-head">
       <div class="fname" title="${esc(fileName)}">${esc(fileName)}</div>
       <div class="badge ${mrz?'':'unknown'}">${esc(badge)}</div>
     </div>
     <div class="preview-zone" id="pv"></div>
     ${rows}
     ${mrz?`<div class="block"><h4>MRZ — ناحیه ماشین‌خوان</h4><div class="mrz">${esc(mrz.lines.join('\n'))}</div></div>`:''}
     <div class="block">
       <details class="raw"><summary>متن کامل OCR</summary>
         <textarea class="rawtext" readonly>${esc(raw)}</textarea>
       </details>
     </div>
     <div class="actions">
       <button class="btn primary" data-act="copy">کپی اطلاعات</button>
       <button class="btn" data-act="download">دانلود فایل متنی</button>
       <button class="btn" data-act="copyraw">کپی متن خام</button>
     </div>`;

  // attach the preview canvas (downscaled for display)
  const pv = card.querySelector('#pv');
  previewCanvas.style.maxHeight='360px';
  pv.appendChild(previewCanvas);

  card.querySelector('[data-act="copy"]').onclick = ()=>{ navigator.clipboard.writeText(txt); toast('اطلاعات کپی شد'); };
  const cr = card.querySelector('[data-act="copyraw"]');
  if (cr) cr.onclick = ()=>{ navigator.clipboard.writeText(raw); toast('متن خام کپی شد'); };
  card.querySelector('[data-act="download"]').onclick = ()=>{
    const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName.replace(/\.[^.]+$/,'') + '.txt';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
    toast('فایل دانلود شد');
  };
}

/* ---------- per-file pipeline ---------- */
async function recognizeCanvas(w, canvas, params){
  await w.setParameters(params);
  const { data } = await w.recognize(canvas);
  return data.text || '';
}

function makeMrzCrops(canvas){
  const bottom = cropCanvas(canvas, 0, 0.54, 1, 0.46, 1.6);
  const lower = cropCanvas(canvas, 0, 0.66, 1, 0.34, 2.0);
  return [bottom, thresholdCanvas(bottom), lower, thresholdCanvas(lower)];
}

async function recognizeDocument(w, canvases){
  const chunks = [];
  const normalParams = {
    tessedit_pageseg_mode: '11',
    preserve_interword_spaces: '1',
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-/.:,()&<> '
  };
  const mrzParams = {
    tessedit_pageseg_mode: '6',
    preserve_interword_spaces: '1',
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<'
  };

  for (const c of canvases){
    chunks.push(await recognizeCanvas(w, c, normalParams));
  }

  for (const c of canvases){
    for (const crop of makeMrzCrops(c)){
      chunks.push(await recognizeCanvas(w, crop, mrzParams));
    }
  }

  return chunks
    .map(t => String(t || '').replace(/[ \t]+\n/g,'\n').trim())
    .filter(Boolean)
    .join('\n\n');
}

async function processFile(file){
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML =
    `<div class="card-head"><div class="fname">${esc(file.name)}</div><div class="badge unknown">در حال خواندن</div></div>
     <div class="preview-zone"><div class="scanline"></div></div>
     <div class="proc"><span>در حال استخراج متن…</span><div class="bar"><i></i></div></div>`;
  resultsEl.prepend(card);
  card.scrollIntoView({behavior:'smooth', block:'center'});
  currentBar = card.querySelector('.bar > i');

  try{
    const isPdf = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
    const canvases = isPdf ? await loadPdfFile(file) : [await loadImageFile(file)];

    const w = await getWorker();
    const ocrText = await recognizeDocument(w, canvases);
    const raw = [canvases.pdfText || '', ocrText]
      .filter(Boolean)
      .join('\n\n')
      .replace(/[ \t]+\n/g,'\n')
      .trim();

    const mrz = findMrz(raw);
    const fields = mergeFields(mrz, raw);

    renderCard(card, file.name, canvases[0], fields, mrz, raw);
  }catch(err){
    const msg = String(err && err.message || err);
    const isWorker = /Worker|blob|sandbox|origin/i.test(msg);
    const body = isWorker
      ? `این صفحه در یک محیط محدود (مثل پیش‌نمایش داخل چت) باز شده و اجازه‌ی اجرای موتور OCR را نمی‌دهد.<br>
         لطفاً فایل را روی <b>GitHub Pages</b> یا یک هاست عادی بگذارید و از آدرس اصلی بازش کنید.`
      : `پردازش این فایل ناموفق بود: ${esc(msg)}`;
    card.innerHTML =
      `<div class="card-head"><div class="fname">${esc(file.name)}</div><div class="badge unknown">خطا</div></div>
       <div class="no-mrz" style="color:var(--danger)">${body}</div>`;
  }finally{
    currentBar = null;
  }
}

function enqueue(files){
  [...files].forEach(file=>{
    queue = queue.then(()=>processFile(file));
  });
}

/* ---------- input wiring ---------- */
fileEl.addEventListener('change', e=>{ if(e.target.files.length) enqueue(e.target.files); fileEl.value=''; });
['dragenter','dragover'].forEach(ev=>dropEl.addEventListener(ev, e=>{e.preventDefault();dropEl.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dropEl.addEventListener(ev, e=>{e.preventDefault();dropEl.classList.remove('drag');}));
dropEl.addEventListener('drop', e=>{ if(e.dataTransfer.files.length) enqueue(e.dataTransfer.files); });
</script>
